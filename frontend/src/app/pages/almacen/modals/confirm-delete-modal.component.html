<div class="fixed inset-0 bg-black/50 backdrop-blur-sm backdrop-saturate-75 z-50 flex items-center justify-center" (click)="closed.emit()">
  @if (item) {
    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full mx-4" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-slate-800">Confirmar Eliminaci&oacute;n</h2>
        <button (click)="closed.emit()" class="p-2 rounded-xl hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="mb-6">
        <div class="w-16 h-16 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </div>
        <p class="text-center text-slate-700 text-lg font-semibold">&iquest;Est&aacute;s seguro?</p>
        <p class="text-center text-slate-500 text-sm mt-1">
          Se eliminar&aacute; <span class="font-semibold text-slate-700">"{{ item.nombre }}"</span> del inventario. Esta acci&oacute;n no se puede deshacer.
        </p>
      </div>
      <div class="flex items-center justify-end gap-3">
        <button (click)="closed.emit()"
          class="px-6 py-3 rounded-xl font-semibold text-sm text-slate-600 hover:bg-slate-100 transition-colors border-2 border-slate-200">Cancelar</button>
        <button (click)="confirm()" [disabled]="submitting"
          class="px-6 py-3 bg-red-600 text-white rounded-xl font-semibold text-sm hover:bg-red-700 transition-colors shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
          {{ submitting ? 'Eliminando...' : 'Eliminar' }}
        </button>
      </div>
    </div>
  }
</div>
