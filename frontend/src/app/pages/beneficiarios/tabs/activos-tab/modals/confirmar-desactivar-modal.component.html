<div class="fixed inset-0 bg-slate-950/45 backdrop-blur-md backdrop-saturate-75 z-50 flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-2xl border border-slate-200 p-6 max-w-sm w-full mx-4 text-center">
    <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
    </div>
    <h3 class="text-lg font-bold text-slate-900 mb-2">Desactivar Beneficiario</h3>
    <p class="text-sm text-slate-600 mb-6">Se desactivara al beneficiario {{ beneficiario?.nombre }} {{ beneficiario?.apellidoPaterno }}. &iquest;Continuar?</p>
    <div class="flex gap-3 justify-center">
      <button (click)="cancelado.emit()" class="px-5 py-2.5 text-sm font-semibold text-slate-700 bg-slate-100 rounded-xl hover:bg-slate-200 transition-colors">Cancelar</button>
      <button (click)="desactivar()" class="px-5 py-2.5 text-sm font-semibold text-white bg-red-500 rounded-xl hover:bg-red-600 transition-colors">Desactivar</button>
    </div>
  </div>
</div>
