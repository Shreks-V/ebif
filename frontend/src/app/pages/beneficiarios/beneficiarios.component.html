<div class="h-screen flex flex-col bg-gradient-to-br from-[#b9e5fb] via-white to-[#e0f2ff] overflow-hidden">
  <app-navbar />

  <main class="flex-1 overflow-y-auto">
    <div class="max-w-[1400px] mx-auto px-8 py-6 space-y-6">

      <!-- Header -->
      <div class="flex items-center gap-5">
        <div class="w-14 h-14 bg-gradient-to-br from-[#00328b] to-[#0052cc] rounded-2xl flex items-center justify-center shadow-xl">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/>
            <line x1="16" y1="11" x2="22" y2="11"/>
          </svg>
        </div>
        <div>
          <h1 class="text-3xl font-black text-slate-900 tracking-tight">Registro de Beneficiarios</h1>
          <p class="text-slate-600 font-semibold">Gestión completa de beneficiarios y membresías</p>
        </div>
      </div>

      <!-- Tabs -->
      <div class="flex gap-2 border-b border-slate-200">
        <button
          (click)="currentTab = 'activos'"
          class="px-4 py-2 text-sm font-semibold transition-colors"
          [ngClass]="currentTab === 'activos' ? 'text-[#00328b] border-b-2 border-[#00328b]' : 'text-slate-600 hover:text-slate-800'">
          Beneficiarios ({{ beneficiariosCount }})
        </button>
        <button
          (click)="currentTab = 'inactivos'"
          class="px-4 py-2 text-sm font-semibold transition-colors"
          [ngClass]="currentTab === 'inactivos' ? 'text-[#00328b] border-b-2 border-[#00328b]' : 'text-slate-600 hover:text-slate-800'">
          Inactivos ({{ inactivosCount }})
        </button>
        <button
          (click)="currentTab = 'preregistros'"
          class="px-4 py-2 text-sm font-semibold transition-colors"
          [ngClass]="currentTab === 'preregistros' ? 'text-[#00328b] border-b-2 border-[#00328b]' : 'text-slate-600 hover:text-slate-800'">
          Aprobación de Preregistro ({{ preregistrosCount }})
        </button>
      </div>

      @defer (when currentTab === 'activos') {
        <div [hidden]="currentTab !== 'activos'">
          <app-activos-tab [isAdmin]="isAdmin" [refreshKey]="refreshActivosKey" (countChange)="beneficiariosCount = $event" />
        </div>
      }

      @defer (when currentTab === 'inactivos') {
        <div [hidden]="currentTab !== 'inactivos'">
          <app-inactivos-tab
            [isAdmin]="isAdmin"
            (countChange)="inactivosCount = $event"
            (reactivado)="onBeneficiarioReactivado()" />
        </div>
      }

      @defer (when currentTab === 'preregistros') {
        <div [hidden]="currentTab !== 'preregistros'">
          <app-preregistros-tab (countChange)="preregistrosCount = $event" (aprobado)="currentTab = 'activos'" />
        </div>
      }

    </div>
    <app-footer />
  </main>
</div>
