<div class="fixed inset-0 bg-black/50 backdrop-blur-sm backdrop-saturate-75 z-50 flex items-center justify-center" appKeyboardClick tabindex="0" (click)="closed.emit()">
  @if (editMedico) {
    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-black text-slate-900">Editar M&eacute;dico</h2>
        <button (click)="closed.emit()" class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-xl transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <form (ngSubmit)="guardar()" class="space-y-5">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="emed-nombre" class="block text-sm font-semibold text-slate-700 mb-1.5">Nombre</label>
            <input id="emed-nombre" type="text" [(ngModel)]="editMedico.nombre" name="editNombre" required
              class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-[#00328b] focus:outline-none transition-colors"/>
          </div>
          <div>
            <label for="emed-apellido-paterno" class="block text-sm font-semibold text-slate-700 mb-1.5">Apellido Paterno</label>
            <input id="emed-apellido-paterno" type="text" [(ngModel)]="editMedico.apellido_paterno" name="editApPaterno" required
              class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-[#00328b] focus:outline-none transition-colors"/>
          </div>
          <div>
            <label for="emed-apellido-materno" class="block text-sm font-semibold text-slate-700 mb-1.5">Apellido Materno</label>
            <input id="emed-apellido-materno" type="text" [(ngModel)]="editMedico.apellido_materno" name="editApMaterno"
              class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-[#00328b] focus:outline-none transition-colors"/>
          </div>
          <div>
            <label for="emed-especialidad" class="block text-sm font-semibold text-slate-700 mb-1.5">Especialidad</label>
            <input id="emed-especialidad" type="text" [(ngModel)]="editMedico.especialidad" name="editEspecialidad" required
              class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-[#00328b] focus:outline-none transition-colors"/>
          </div>
          <div>
            <label for="emed-telefono" class="block text-sm font-semibold text-slate-700 mb-1.5">Tel&eacute;fono</label>
            <input id="emed-telefono" type="text" [(ngModel)]="editMedico.telefono" name="editTelefono"
              class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-[#00328b] focus:outline-none transition-colors"/>
          </div>
          <div>
            <label for="emed-correo" class="block text-sm font-semibold text-slate-700 mb-1.5">Correo</label>
            <input id="emed-correo" type="email" [(ngModel)]="editMedico.correo" name="editCorreo"
              class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-[#00328b] focus:outline-none transition-colors"/>
          </div>
        </div>
        <div>
          <label for="emed-estado" class="block text-sm font-semibold text-slate-700 mb-1.5">Estado</label>
          <select id="emed-estado" [(ngModel)]="editMedico.activo" name="editActivo"
            class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-[#00328b] focus:outline-none transition-colors">
            <option value="S">Activo</option>
            <option value="N">Inactivo</option>
          </select>
        </div>
        <div>
          <span class="block text-sm font-semibold text-slate-700 mb-2">Servicios</span>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 max-h-48 overflow-y-auto p-3 bg-slate-50 rounded-xl border border-slate-200">
            @for (s of serviciosList; track s) {
              <label class="flex items-center gap-2 cursor-pointer px-3 py-2 rounded-lg hover:bg-white transition-colors">
                <input type="checkbox" [checked]="serviciosSeleccionados.includes(s.id_servicio)" (change)="toggleServicio(s.id_servicio)"
                  class="w-4 h-4 rounded border-slate-300 text-[#00328b] focus:ring-[#00328b]"/>
                <span class="text-sm text-slate-700">{{ s.nombre }}</span>
              </label>
            }
          </div>
        </div>
        @if (error) {
          <p class="text-sm text-red-600 bg-red-50 border border-red-200 rounded-xl px-4 py-2.5">{{ error }}</p>
        }
        <div class="flex justify-end gap-3 pt-4 border-t border-slate-200">
          <button type="button" (click)="closed.emit()" class="px-6 py-3 text-sm font-semibold text-slate-700 bg-slate-100 rounded-xl hover:bg-slate-200 transition-colors">Cancelar</button>
          <button type="submit" [disabled]="guardando" class="px-6 py-3 text-sm font-semibold text-white bg-[#00328b] rounded-xl hover:bg-[#002a75] transition-colors disabled:opacity-50">
            {{ guardando ? 'Guardando...' : 'Guardar Cambios' }}
          </button>
        </div>
      </form>
    </div>
  }
</div>
