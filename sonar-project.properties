# SonarCloud project configuration
sonar.projectKey=Shreks-V_ebif
sonar.organization=shreks-v

# Source and test paths
sonar.sources=backend/app,frontend/src
sonar.tests=Pruebas,pruebas-s2,backend/tests
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml

# Excluir de cobertura: frontend (sin reporte TS), adaptadores Oracle (requieren BD real), migraciones y scripts
sonar.coverage.exclusions=frontend/src/**,backend/app/infrastructure/**,backend/db/**,scripts/**

# Exclusions
sonar.exclusions=Pruebas/**,frontend/src/**/*.spec.ts,**/node_modules/**,frontend/dist/**,backend/venv/**,backend/Dockerfile
sonar.test.inclusions=Pruebas/**

# CPD (copy-paste detection) exclusions
# Migration files are additive by design — each migration can re-declare
# (CREATE OR REPLACE) the same procedure updated from a previous migration.
# Seed and test support files also contain intentional repetition.
sonar.cpd.exclusions=backend/db/migrations/**,backend/db/seed_dummies.py,Pruebas/**,**/*.component.html
