services:
  backend:
    build: ./backend
    container_name: ebif-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./wallet:/wallet:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: ebif-frontend
    working_dir: /app
    ports:
      - "80:4200"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  frontend_node_modules:
