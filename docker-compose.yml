services:
  backend:
    build: ./backend
    container_name: ebif-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./wallet:/wallet:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: prod
    container_name: ebif-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_node_modules:
