name: pytest to Qase

# Publica resultados a Qase TestOps. Requiere secretos del repositorio.
on:
  workflow_dispatch:

jobs:
  tests-with-qase:
    runs-on: ubuntu-latest
    env:
      QASE_MODE: testops
      QASE_TESTOPS_API_TOKEN: ${{ secrets.QASE_TESTOPS_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Sync Sprint 2 cases in Qase
        run: python scripts/qase_sync_sprint2.py
        env:
          QASE_TESTOPS_PROJECT: FJ26SV

      - name: Run pytest (report to Qase)
        run: python -m pytest Pruebas/ pruebas-s2/ --tb=short -q
        env:
          SECRET_KEY: ci-dummy-secret-key-not-used-in-prod
          ORACLE_USER: ""
          ORACLE_PASSWORD: ""
          ORACLE_DSN: ""
